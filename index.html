<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>오늘의 운세를 음성과 자막으로 듣기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="stage">
        <div class="topbar">
          <div>
            <p class="eyebrow">Daily Fortune Theater</p>
            <h1>오늘의 운세를<br />음성과 자막으로 듣기</h1>
          </div>
          <button class="icon-button" id="muteButton" type="button" aria-label="음성 켜기 또는 끄기">🔊</button>
        </div>

        <div class="oracle" id="oracle">
          <div class="aura" aria-hidden="true"></div>
          <div class="portrait" id="portrait" aria-hidden="true"></div>
          <div class="nameplate">
            <span id="narratorTitle">설명자 대기 중</span>
            <strong id="narratorName">?</strong>
          </div>
        </div>

        <div class="subtitle-box">
          <p id="subtitle">오늘의 목소리를 소환해 보세요.</p>
        </div>

        <div class="controls">
          <button class="primary" id="startButton" type="button">운세 듣기</button>
          <button class="secondary" id="againButton" type="button">다른 설명자</button>
        </div>
      </section>

      <section class="meter" aria-label="오늘의 운세 능력치">
        <div>
          <span>웃음운</span>
          <i style="--value: 88%"></i>
        </div>
        <div>
          <span>금전운</span>
          <i style="--value: 63%"></i>
        </div>
        <div>
          <span>연애운</span>
          <i style="--value: 74%"></i>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
